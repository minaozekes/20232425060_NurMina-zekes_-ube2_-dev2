<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soru 2 - Kullanıcı Kontrol</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #fce4ec;
            margin: 0;
        }

        .container {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        h1 {
            color: #d81b60;
            margin-bottom: 20px;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            color: white;
            background-color: #e91e63;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #c2185b;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Soru 2 - Kullanıcı Kontrolü</h1>
        <p>Bilgilerinizi sisteme girmek için aşağıdaki butona tıklayınız</p>
        <button onclick="kullaniciKontrol()">Sisteme Giriş Yap</button>
    </div>

    <script src="app2.js"></script>
</body>

</html>
